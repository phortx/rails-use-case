plugins:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable
  SuggestExtensions: false
  Include:
    - '**/*.rb'
  Exclude:
    - bin/**/*
    - tmp/**/*
    - '*.gem'
    - vendor/**/*

Layout/LineLength:
  Max: 120

RSpec/NestedGroups:
  Max: 5

RSpec/ExampleLength:
  Enabled: false

# AbcCheck makes more sense.
Metrics/MethodLength:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - spec/**/*

Naming/FileName:
  Exclude:
    - Gemfile

Metrics/ClassLength:
  Max: 150


# Empty lines help to structure the code and increase readability
Layout/EmptyLines:
  Enabled: false

Layout/EmptyLineBetweenDefs:
  Enabled: false

Layout/EmptyLinesAroundExceptionHandlingKeywords:
  Enabled: false


# It's nice to keep block arguments for documentation purposes
Lint/UnusedBlockArgument:
  Enabled: false


# Enforce inline access modifiers because it's more readable than group style.
Style/AccessModifierDeclarations:
  EnforcedStyle: inline


RSpec/MultipleExpectations:
  Enabled: false


Style/LambdaCall:
  Enabled: false

RSpec/AnyInstance:
  Enabled: false

# Spec files intentionally define multiple helper classes per file
Style/OneClassPerFile:
  Exclude:
    - spec/**/*

# Spec helper methods use descriptive names that don't follow predicate conventions
Naming/PredicateMethod:
  Exclude:
    - spec/**/*
